steps:
  # Step 1: Build the Flutter Web app
  - name: 'ghcr.io/cirruslabs/flutter:3.19.6'
    args: ['bash', '-c', 'cd frontend && flutter pub get && flutter build web --release --no-tree-shake-icons --dart-define=BACKEND_URL="${_BACKEND_URL}"']
  
  # Step 2: Build the Nginx container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/equilabel-frontend', '-f', 'frontend/Dockerfile.deploy', 'frontend/']

images:
  - 'gcr.io/$PROJECT_ID/equilabel-frontend'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
